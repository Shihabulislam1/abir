serial_bridge_node:
  ros__parameters:
    port: "/dev/ttyACM0"
    baudrate: 115200
    wheel_separation: 0.2
    max_pwm: 255
    speed_to_pwm_factor: 500.0

brain_node:
  ros__parameters:
    kp: 0.005
    kd: 0.001
    base_speed: 0.3
    nudge_duration: 1.2

lidar_monitor_node:
  ros__parameters:
    front_danger_zone: 0.6
    side_safe_zone: 0.8
    scan_topic: "/scan"

vision_node:
  ros__parameters:
    video_device: 3
    target_lane: 1
    camera_source: "webcam"
    camera_rotate_180: false
    stream_enabled: true
    stream_port: 8080
    jpeg_quality: 80
    lidar_overlay_enabled: true
    lidar_max_range_mm: 6000.0
    lidar_inset_size_px: 220
